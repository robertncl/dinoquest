name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "25"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check / bundle server
        run: bun build ./server.ts --target bun --outdir ./.build

      - name: Smoke test server
        run: |
          set -euo pipefail
          PORT=3000 bun server.ts &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          # Wait for the server to accept connections (up to ~10s).
          for _ in $(seq 1 50); do
            if curl -fsS http://localhost:3000/ -o /dev/null; then break; fi
            sleep 0.2
          done

          curl -fsS http://localhost:3000/ -o /dev/null
          curl -fsS http://localhost:3000/game.js -o /dev/null
          curl -fsS http://localhost:3000/style.css -o /dev/null

          missing=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/does-not-exist.js)
          test "$missing" = "404"
          echo "Smoke test passed."
