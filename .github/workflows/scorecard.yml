name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "41 5 * * 1" # Mondays at 05:41 UTC
  push:
    branches: [master]

# Read-all by default; the job below elevates only what it needs.
permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload results to the code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge (public repos only).
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes results to the OpenSSF REST API for the score badge.
          # Only works on public repositories; set to false for private repos.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3.36.0
        with:
          sarif_file: results.sarif
